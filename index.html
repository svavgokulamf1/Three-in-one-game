<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Arcade</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}
header{
    background:#111;
    padding:15px;
}
button{
    padding:10px 20px;
    margin:8px;
    border:none;
    border-radius:25px;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    background:#ff9800;
}
button:hover{background:#ff5722;}
.screen{display:none;padding:20px;}
.active{display:block;}
canvas{
    background:black;
    border-radius:10px;
}
.jumpBtn{
    font-size:22px;
    padding:15px 40px;
    margin-top:10px;
    background:#4caf50;
}
.score{
    margin-top:10px;
    font-size:18px;
}
</style>
</head>
<body>

<header>
<h2>🔥 SUPER 3-IN-1 ARCADE BY VISHAKAN 🔥</h2>
<button onclick="showScreen('home')">🏠 Home</button>
<button onclick="showScreen('guess')">🎯 Guess</button>
<button onclick="showScreen('flappy')">🐦 Flappy</button>
<button onclick="showScreen('dino')">🦖 Dino</button>
</header>

<!-- HOME -->
<div id="home" class="screen active">
<h3>Welcome to Super Arcade</h3>
<p>Select a game above to start playing.</p>
</div>

<!-- GUESS -->
<div id="guess" class="screen">
<h3>Guess The Number (1-20)</h3>
<input type="number" id="gInput">
<button onclick="checkGuess()">Guess</button>
<p id="gMsg"></p>
<div class="score">
Score: <span id="gScore">0</span> |
High: <span id="gHigh">0</span>
</div>
</div>

<!-- FLAPPY -->
<div id="flappy" class="screen">
<h3>Flappy</h3>
<canvas id="fCanvas" width="300" height="400"></canvas>
<br>
<button class="jumpBtn" onclick="flap()">⬆ JUMP</button>
<div class="score">
Score: <span id="fScore">0</span> |
High: <span id="fHigh">0</span>
</div>
</div>

<!-- DINO -->
<div id="dino" class="screen">
<h3>Dino Jump</h3>
<canvas id="dCanvas" width="300" height="200"></canvas>
<br>
<button class="jumpBtn" onclick="dinoJump()">⬆ JUMP</button>
<div class="score">
Score: <span id="dScore">0</span> |
High: <span id="dHigh">0</span>
</div>
</div>

<script>
function showScreen(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ================= GUESS ================= */
let secret=Math.floor(Math.random()*20)+1;
let gScore=0;
let gHigh=localStorage.getItem("gHigh")||0;
document.getElementById("gHigh").innerText=gHigh;

function checkGuess(){
    let val=Number(document.getElementById("gInput").value);
    if(val===secret){
        gScore+=10;
        secret=Math.floor(Math.random()*20)+1;
        document.getElementById("gMsg").innerText="Correct!";
    }else if(val>secret){
        document.getElementById("gMsg").innerText="Too High!";
    }else{
        document.getElementById("gMsg").innerText="Too Low!";
    }
    document.getElementById("gScore").innerText=gScore;
    if(gScore>gHigh){
        gHigh=gScore;
        localStorage.setItem("gHigh",gHigh);
        document.getElementById("gHigh").innerText=gHigh;
    }
}

/* ================= FLAPPY ================= */
let fCanvas=document.getElementById("fCanvas");
let fCtx=fCanvas.getContext("2d");
let birdY=200,vel=0,gravity=0.5;
let pipeX=300,gap=120,pipeTop=100;
let fScore=0;
let fHigh=localStorage.getItem("fHigh")||0;
document.getElementById("fHigh").innerText=fHigh;

function flap(){
    vel=-8;
}

function drawFlappy(){
    fCtx.clearRect(0,0,300,400);
    vel+=gravity;
    birdY+=vel;

    fCtx.fillStyle="yellow";
    fCtx.fillRect(50,birdY,20,20);

    fCtx.fillStyle="green";
    fCtx.fillRect(pipeX,0,40,pipeTop);
    fCtx.fillRect(pipeX,pipeTop+gap,40,400);

    pipeX-=2;
    if(pipeX<-40){
        pipeX=300;
        pipeTop=Math.random()*200;
        fScore++;
        document.getElementById("fScore").innerText=fScore;
        if(fScore>fHigh){
            fHigh=fScore;
            localStorage.setItem("fHigh",fHigh);
            document.getElementById("fHigh").innerText=fHigh;
        }
    }

    if(birdY>400 ||
      (50+20>pipeX && 50<pipeX+40 &&
      (birdY<pipeTop || birdY+20>pipeTop+gap))){
        birdY=200;
        vel=0;
        pipeX=300;
        fScore=0;
        document.getElementById("fScore").innerText=fScore;
    }

    requestAnimationFrame(drawFlappy);
}
drawFlappy();

document.addEventListener("keydown",e=>{
    if(e.code==="Space") flap();
});

/* ================= DINO ================= */
let dCanvas=document.getElementById("dCanvas");
let dCtx=dCanvas.getContext("2d");
let dinoY=150,jump=0,obsX=300;
let dScore=0;
let dHigh=localStorage.getItem("dHigh")||0;
document.getElementById("dHigh").innerText=dHigh;

function dinoJump(){
    if(dinoY===150){
        jump=20;
    }
}

function drawDino(){
    dCtx.clearRect(0,0,300,200);

    if(jump>0){
        dinoY-=5;
        jump--;
    }else if(dinoY<150){
        dinoY+=5;
    }

    dCtx.fillStyle="white";
    dCtx.fillRect(50,dinoY,20,20);

    dCtx.fillStyle="red";
    dCtx.fillRect(obsX,150,15,20);

    obsX-=3;
    if(obsX<-15){
        obsX=300;
        dScore++;
        document.getElementById("dScore").innerText=dScore;
        if(dScore>dHigh){
            dHigh=dScore;
            localStorage.setItem("dHigh",dHigh);
            document.getElementById("dHigh").innerText=dHigh;
        }
    }

    if(50+20>obsX && 50<obsX+15 && dinoY+20>150){
        obsX=300;
        dScore=0;
        document.getElementById("dScore").innerText=dScore;
    }

    requestAnimationFrame(drawDino);
}
drawDino();

document.addEventListener("keydown",e=>{
    if(e.code==="Space") dinoJump();
});
</script>

</body>
</html>
